<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitsGPT — BPHC AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #F47D20;
      --orange-dark: #d96e14;
      --orange-light: #fff3e8;
      --bg: #0f1117;
      --bg-surface: #1a1d2e;
      --bg-card: #20243a;
      --border: #2e3352;
      --text: #e8eaf0;
      --text-muted: #8b91b0;
      --user-bubble: #1e3a5f;
      --bot-bubble: #20243a;
      --radius: 14px;
      --font: 'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--orange);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Chat area ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome screen ── */
    #welcome {
      margin: auto;
      text-align: center;
      max-width: 480px;
      padding: 20px;
    }

    #welcome .big-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: white;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px rgba(244, 125, 32, 0.3);
    }

    #welcome h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    #welcome h2 span { color: var(--orange); }

    #welcome p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .suggestions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      text-align: left;
    }

    @media (max-width: 400px) {
      .suggestions-grid { grid-template-columns: 1fr; }
    }

    .suggestion-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .suggestion-btn:hover {
      border-color: var(--orange);
      background: rgba(244, 125, 32, 0.08);
      color: var(--orange);
    }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      gap: 10px;
      max-width: 760px;
      width: 100%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; margin-left: auto; }
    .message.bot  { margin-right: auto; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .message.bot .avatar  { background: var(--orange); color: white; }
    .message.user .avatar { background: #334155; color: var(--text-muted); }

    .bubble {
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      max-width: calc(100% - 44px);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #2a4a7f;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble strong { color: var(--orange); }
    .bubble em     { color: var(--text-muted); font-style: normal; }

    .bubble ul, .bubble ol {
      padding-left: 20px;
      margin: 6px 0;
    }

    .bubble li { margin: 3px 0; }

    .bubble p { margin: 4px 0; }

    /* ── Sources ── */
    .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .sources-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .source-tag {
      display: inline-block;
      background: rgba(244, 125, 32, 0.12);
      color: var(--orange);
      border: 1px solid rgba(244, 125, 32, 0.25);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      margin: 2px;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40%           { transform: scale(1.2); opacity: 1; }
    }

    /* ── Input bar ── */
    #input-bar {
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 760px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    #user-input:focus  { border-color: var(--orange); }
    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--orange);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover  { background: var(--orange-dark); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; fill: white; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
    }

    /* ── Error toast ── */
    #error-toast {
      position: fixed;
      top: 16px;
      right: 16px;
      background: #7f1d1d;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      z-index: 100;
      max-width: 320px;
    }

    /* ── Markdown-ish rendering ── */
    .bubble-content { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>

<header>
  <div class="logo">B</div>
  <div class="header-text">
    <h1>BitsGPT</h1>
    <p>BITS Pilani Hyderabad Campus · AI Knowledge Assistant</p>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    <span>Online</span>
  </div>
</header>

<div id="chat-area">
  <div id="welcome">
    <div class="big-logo">B</div>
    <h2>Hey BITSian! <span>Ask me anything.</span></h2>
    <p>I know everything about BPHC — academics, clubs, hostels, fests, the SU constitution, fees, campus life, and more. Powered by Groq.</p>
    <div class="suggestions-grid" id="suggestions-grid">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<div id="input-bar">
  <div class="input-row">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Ask about CGPA, clubs, PS, hostels, fees, jargon…"
      autocomplete="off"
      spellcheck="false"
    ></textarea>
    <button id="send-btn" title="Send (Enter)">
      <svg viewBox="0 0 24 24"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Enter to send · Shift+Enter for new line</p>
</div>

<div id="error-toast"></div>

<script src="app.js"></script>
</body>
</html>
